      tags: [history]
      summary: Update a history section (Site Admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHistorySectionInput"
      responses:
        "200":
          description: Section updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistorySection"
        "400":
          description: Invalid request
        "403":
          description: Forbidden
        "404":
          description: Section not found
    delete:
      operationId: deleteHistorySection
      tags: [history]
      summary: Delete a history section (Site Admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Section deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "403":
          description: Forbidden
        "404":
          description: Section not found

  /storage/objects/{objectPath}:
    get:
      operationId: getStorageObject
      tags: [storage]
      summary: Serve an uploaded object (authenticated users only)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: objectPath
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
        "404":
          description: Object not found

