openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Pershing307 Member Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and 2FA
  - name: bootstrap
    description: Initial portal setup
  - name: users
    description: User management
  - name: invitations
    description: Invitation management
  - name: roles
    description: Role management
  - name: domains
    description: Protected domain access
  - name: degrees
    description: Masonic degree records
  - name: config
    description: Portal configuration
  - name: audit
    description: Audit log
  - name: birthdays
    description: Birthday calendar
  - name: roadmap
    description: Roadmap and upcoming features
  - name: profile
    description: Member profile and privacy settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bootstrap/status:
    get:
      operationId: getBootstrapStatus
      tags: [bootstrap]
      summary: Check if portal has been bootstrapped
      responses:
        "200":
          description: Bootstrap status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapStatus"

  /bootstrap:
    post:
      operationId: runBootstrap
      tags: [bootstrap]
      summary: Run initial portal setup wizard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapInput"
      responses:
        "201":
          description: Bootstrap completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResult"
        "409":
          description: Already bootstrapped

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful or 2FA required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials
        "423":
          description: Account locked

  /auth/login/2fa:
    post:
      operationId: verifyTwoFactor
      tags: [auth]
      summary: Complete login with 2FA code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorInput"
      responses:
        "200":
          description: 2FA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid code

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResult"
        "401":
          description: Not authenticated

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent (always succeeds to prevent enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "400":
          description: Invalid or expired token

  /auth/2fa/status:
    get:
      operationId: getTwoFactorStatus
      tags: [auth]
      summary: Get current user 2FA enrollment status
      responses:
        "200":
          description: 2FA status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorStatus"
        "401":
          description: Not authenticated

  /auth/2fa/enroll:
    post:
      operationId: enrollTwoFactor
      tags: [auth]
      summary: Begin 2FA enrollment — returns QR code URI and backup codes
      responses:
        "200":
          description: Enrollment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorEnrollResult"
        "401":
          description: Not authenticated

  /auth/2fa/verify-enroll:
    post:
      operationId: verifyTwoFactorEnroll
      tags: [auth]
      summary: Verify first TOTP code and activate 2FA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorVerifyEnrollInput"
      responses:
        "200":
          description: 2FA activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "400":
          description: Invalid code or no pending enrollment
        "401":
          description: Not authenticated

  /auth/2fa:
    delete:
      operationId: disableTwoFactor
      tags: [auth]
      summary: Disable 2FA for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorInput"
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Invalid code

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password for authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "400":
          description: Invalid current password

  /auth/profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateInput"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "401":
          description: Not authenticated

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin) with optional pagination and search
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResult"
        "401":
          description: Not authenticated
        "403":
          description: Insufficient permissions

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user details (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResult"
        "404":
          description: User not found

  /users/{id}/test-reset:
    delete:
      operationId: resetTestUser
      tags: [users]
      summary: Permanently remove a test user (DEV/TDA only)
      description: >
        Testing-only action. Permanently removes a test user and all related
        records so the email address can be invited again. Disabled in production.
        Audit logs are preserved (anonymized). Restricted to PM Super Administrators.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test user removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "400":
          description: Cannot remove self or final PM Super Administrator
        "403":
          description: Disabled in this environment
        "404":
          description: User not found

  /users/{id}/deactivate:
    patch:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate a user account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/{id}/activate:
    patch:
      operationId: activateUser
      tags: [users]
      summary: Activate a user account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/{id}/reset-password:
    post:
      operationId: adminResetPassword
      tags: [users]
      summary: Reset a member's password (admin action)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Temporary password issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminResetPasswordResult"
        "403":
          description: Forbidden (last PM Super Administrator or insufficient role)
        "404":
          description: User not found

  /users/{id}/membership-status:
    patch:
      operationId: updateUserMembershipStatus
      tags: [users]
      summary: Update a user's membership status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMembershipStatusInput"
      responses:
        "200":
          description: Membership status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/fix-membership:
    post:
      operationId: fixMembership
      tags: [users]
      summary: Bulk-correct active users stuck in pending membership status
      responses:
        "200":
          description: Number of users corrected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixMembershipResult"

  /users/{id}/roles:
    post:
      operationId: grantUserRole
      tags: [users]
      summary: Grant a role to a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleAssignment"
      responses:
        "200":
          description: Role granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/{id}/roles/{roleId}:
    delete:
      operationId: revokeUserRole
      tags: [users]
      summary: Revoke a role from a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: roleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Role revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/{id}/domains:
    get:
      operationId: getUserDomains
      tags: [users]
      summary: List domain access grants for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain access list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDomainAccessListResult"
    post:
      operationId: grantUserDomain
      tags: [users]
      summary: Grant a protected domain access to a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainGrantInput"
      responses:
        "200":
          description: Access granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/{id}/domains/{domainId}:
    delete:
      operationId: revokeUserDomain
      tags: [users]
      summary: Revoke protected domain access from a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: domainId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Access revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/{id}/degrees:
    get:
      operationId: getUserDegrees
      tags: [users]
      summary: List degree records for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Degree list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDegreeListResult"
    post:
      operationId: addUserDegree
      tags: [users]
      summary: Add a degree record for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DegreeInput"
      responses:
        "201":
          description: Degree added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/{id}/degrees/{degreeId}:
    delete:
      operationId: removeUserDegree
      tags: [users]
      summary: Remove a degree record from a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: degreeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Degree removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /invitations:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List all invitations (admin)
      responses:
        "200":
          description: Invitation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationListResult"
    post:
      operationId: createInvitation
      tags: [invitations]
      summary: Create a new invitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationInput"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationCreatedResult"
        "409":
          description: User or invitation already exists

  /invitations/accept/{token}:
    get:
      operationId: getInvitationByToken
      tags: [invitations]
      summary: Look up invitation by token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationLookupResult"
        "404":
          description: Invitation token is invalid (code INVALID_TOKEN)
        "409":
          description: Invitation already accepted (code ALREADY_ACCEPTED)
        "410":
          description: Invitation expired or revoked (code EXPIRED or REVOKED)

  /invitations/accept:
    post:
      operationId: acceptInvitation
      tags: [invitations]
      summary: Accept an invitation and create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "400":
          description: Password does not meet requirements (code PASSWORD_INVALID) or malformed request
        "404":
          description: Invitation token is invalid (code INVALID_TOKEN)
        "409":
          description: Invitation already accepted (code ALREADY_ACCEPTED) or user already exists (code USER_EXISTS)
        "410":
          description: Invitation expired or revoked (code EXPIRED or REVOKED)

  /invitations/cleanup:
    delete:
      operationId: cleanupInvitations
      tags: [invitations]
      summary: Remove all expired and revoked invitations (admin)
      responses:
        "200":
          description: Cleanup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupInvitationsResult"

  /invitations/{id}:
    delete:
      operationId: revokeInvitation
      tags: [invitations]
      summary: Revoke a pending invitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "404":
          description: Invitation not found

  /invitations/{id}/link:
    get:
      operationId: getInvitationLink
      tags: [invitations]
      summary: Get the invitation accept link (for copy when SMTP is unavailable)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationLinkResult"
        "404":
          description: Invitation not found or already accepted

  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List all roles (admin)
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListResult"

  /domains:
    get:
      operationId: listDomains
      tags: [domains]
      summary: List all protected domains (admin)
      responses:
        "200":
          description: Domain list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainListResult"

  /domains/{domainId}/members:
    get:
      operationId: getDomainMembers
      tags: [domains]
      summary: List members with access to a protected domain (admin)
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainMembersResult"
        "404":
          description: Domain not found

  /degree-definitions:
    get:
      operationId: listDegreeDefinitions
      tags: [degrees]
      summary: List configurable degree definitions
      responses:
        "200":
          description: Degree definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DegreeDefinitionListResult"
    put:
      operationId: updateDegreeDefinitions
      tags: [degrees]
      summary: Update degree definitions (site admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DegreeDefinitionUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /config:
    get:
      operationId: listConfig
      tags: [config]
      summary: List all configuration entries (site admin)
      responses:
        "200":
          description: Config list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigListResult"

  /config/test-smtp:
    post:
      operationId: testSmtp
      tags: [config]
      summary: Send a test email to verify SMTP configuration (site admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestSmtpInput"
      responses:
        "200":
          description: Test email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmtpTestResult"
        "502":
          description: SMTP send failed
        "503":
          description: SMTP not configured

  /config/{key}:
    put:
      operationId: updateConfig
      tags: [config]
      summary: Update a configuration value (site admin)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigUpdateInput"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "403":
          description: Key is read-only

  /audit:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit log entries (admin)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: action
          in: query
          schema:
            type: string
        - name: actorEmail
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: targetType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResult"

  /birthdays/upcoming:
    get:
      operationId: getUpcomingBirthdays
      tags: [birthdays]
      summary: Get upcoming birthdays (next 30 days)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Upcoming birthdays
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpcomingBirthdaysResult"
        "401":
          description: Unauthorized

  /birthdays:
    get:
      operationId: listBirthdays
      tags: [birthdays]
      summary: List all birthdays grouped by month
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Birthdays by month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BirthdaysByMonthResult"
        "401":
          description: Unauthorized

  /profile/date-of-birth:
    get:
      operationId: getOwnDateOfBirth
      tags: [profile]
      summary: Get the current member's own date of birth (read-only)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current member's date of birth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DateOfBirthResult"
        "401":
          description: Unauthorized

  /profile/birthday-visibility:
    get:
      operationId: getBirthdayVisibility
      tags: [profile]
      summary: Get the current member's birthday visibility setting
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current visibility setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BirthdayVisibilityResult"
        "401":
          description: Unauthorized
    patch:
      operationId: updateBirthdayVisibility
      tags: [profile]
      summary: Update the current member's birthday visibility setting
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBirthdayVisibilityInput"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "400":
          description: Invalid visibility value
        "401":
          description: Unauthorized

  /users/{id}/date-of-birth:
    patch:
      operationId: updateDateOfBirth
      tags: [users]
      summary: Update a member's date of birth (Site Admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDateOfBirthInput"
      responses:
        "200":
          description: Date of birth updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "400":
          description: Invalid date format
        "403":
          description: Forbidden
        "404":
          description: User not found

  /roadmap:
    get:
      operationId: listRoadmapItems
      tags: [roadmap]
      summary: List roadmap items (visible only for members, all for admins)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Roadmap items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadmapListResult"
        "401":
          description: Unauthorized
    post:
      operationId: createRoadmapItem
      tags: [roadmap]
      summary: Create a roadmap item (Site Admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoadmapItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadmapItem"
        "400":
          description: Invalid request
        "403":
          description: Forbidden

  /roadmap/reorder:
    post:
      operationId: reorderRoadmapItems
      tags: [roadmap]
      summary: Reorder roadmap items (Site Admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRoadmapInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "403":
          description: Forbidden

  /roadmap/{id}:
    put:
      operationId: updateRoadmapItem
      tags: [roadmap]
      summary: Update a roadmap item (Site Admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoadmapItemInput"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoadmapItem"
        "400":
          description: Invalid request
        "403":
          description: Forbidden
        "404":
          description: Item not found
    delete:
      operationId: deleteRoadmapItem
      tags: [roadmap]
      summary: Delete a roadmap item (Site Admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"
        "403":
          description: Forbidden
        "404":
          description: Item not found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    BootstrapStatus:
      type: object
      required: [bootstrapped]
      properties:
        bootstrapped:
          type: boolean

    BootstrapInput:
      type: object
      required: [lodgeName, lodgeNumber, timezone, adminEmail, adminFirstName, adminLastName, adminPassword]
      properties:
        lodgeName:
          type: string
          minLength: 2
          maxLength: 200
        lodgeNumber:
          type: string
          minLength: 1
          maxLength: 50
        timezone:
          type: string
        adminEmail:
          type: string
          format: email
        adminFirstName:
          type: string
          minLength: 1
          maxLength: 100
        adminLastName:
          type: string
          minLength: 1
          maxLength: 100
        adminPassword:
          type: string
          minLength: 12
        smtpHost:
          type: ["string", "null"]
        smtpPort:
          type: ["string", "null"]
        smtpUser:
          type: ["string", "null"]
        smtpFromEmail:
          type: ["string", "null"]
        smtpFromName:
          type: ["string", "null"]

    BootstrapResult:
      type: object
      required: [success, message, lodge]
      properties:
        success:
          type: boolean
        message:
          type: string
        lodge:
          $ref: "#/components/schemas/LodgeSummary"

    LodgeSummary:
      type: object
      required: [id, name, number]
      properties:
        id:
          type: string
        name:
          type: string
        number:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    TwoFactorInput:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 8

    TwoFactorStatus:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        enrolledAt:
          type: ["string", "null"]
        hasPendingEnrollment:
          type: boolean

    TwoFactorEnrollResult:
      type: object
      required: [qrCodeUri, backupCodes]
      properties:
        qrCodeUri:
          type: string
        backupCodes:
          type: array
          items:
            type: string

    TwoFactorVerifyEnrollInput:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 8

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 12

    ProfileUpdateInput:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        displayName:
          type: ["string", "null"]
          maxLength: 100

    UserRole:
      type: object
      required: [name, slug, permissionLevel]
      properties:
        name:
          type: string
        slug:
          type: string
        permissionLevel:
          type: integer

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, roles]
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: ["string", "null"]
        mustChangePassword:
          type: boolean
        hasTemporaryPassword:
          type: boolean
        profileSetupRequired:
          type: boolean
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"

    LoginResult:
      type: object
      properties:
        requiresTwoFactor:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"

    CurrentUserResult:
      type: object
      properties:
        user:
          allOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: object
              properties:
                membershipStatus:
                  type: ["string", "null"]
        pendingTwoFactor:
          type: boolean
          description: >
            True when the session has a pending 2FA challenge (password was
            accepted, TOTP code not yet verified). Returned by /auth/me so
            mobile browsers that reload the page during app-switching can
            restore the 2FA step without re-entering credentials.
        pendingTwoFactorExpired:
          type: boolean
          description: >
            True when a pending 2FA session existed but its 5-minute window
            has lapsed. The client should show an expiry notice and prompt
            the user to sign in again.

    SuccessResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: ["string", "null"]

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 12

    UserSummary:
      type: object
      required: [id, email, firstName, lastName, isActive, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: ["string", "null"]
        membershipStatus:
          type: ["string", "null"]
        isActive:
          type: boolean
        lastLoginAt:
          type: ["string", "null"]
        createdAt:
          type: string

    UserListResult:
      type: object
      required: [users, total, limit, offset]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserSummary"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    RoleDetail:
      type: object
      required: [id, name, slug, permissionLevel]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        permissionLevel:
          type: integer

    UserDetail:
      type: object
      required: [id, email, firstName, lastName, isActive, emailVerified, mustChangePassword, createdAt, roles]
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: ["string", "null"]
        membershipStatus:
          type: ["string", "null"]
        isActive:
          type: boolean
        emailVerified:
          type: boolean
        mustChangePassword:
          type: boolean
        lastLoginAt:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
          format: date
        birthdayVisibility:
          type: string
          enum: [hidden, day_month, full]
        createdAt:
          type: string
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleDetail"

    UserDetailResult:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserDetail"
        testResetEnabled:
          type: boolean

    DomainMember:
      type: object
      required: [userId, firstName, lastName, email, grantedAt]
      properties:
